# SFT v3 Training Config — Qwen3-4B-Thinking-2507
# Dataset: 452 items (374 R1/R2 + 16 W1 + 62 W2), 530 effective samples

model_name_or_path: Qwen/Qwen3-4B-Thinking-2507
output_dir: /mnt/user-data/outputs/sft_v3_checkpoints

# Training
num_train_epochs: 8
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
lr_scheduler_type: cosine
weight_decay: 0.01
max_steps: -1
save_strategy: epoch
save_steps: null
save_total_limit: 10

# Sequence
max_seq_length: 32768

# LoRA
use_peft: true
peft_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05

# Precision + optimization
bf16: true
seed: 42
logging_steps: 10
eval_strategy: no
dataloader_num_workers: 4
remove_unused_columns: false

# Notes
# - Effective samples per epoch: 530 (with weights: 374×1 + 16×2 + 62×2)
# - Total samples across 8 epochs: 4240
# - Batch updates per epoch: ceil(530 / (2 × 8)) ≈ 33 updates/epoch
# - Trace lengths: min=5, median=117, max=937 tokens (mean 157)
# - No-box rate: 0%
# - Base model: Qwen3-4B-Thinking-2507 (final + training variant)
