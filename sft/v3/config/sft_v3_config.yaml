# SFT v3 Training Config — Qwen3-4B-Thinking-2507
# Dataset: 493 items, 594 effective samples (with weights)

model_name_or_path: Qwen/Qwen3-4B-Thinking-2507
output_dir: /mnt/user-data/outputs/sft_v3_checkpoints

# Training
num_train_epochs: 8
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
lr_scheduler_type: cosine
weight_decay: 0.01
max_steps: -1
save_strategy: epoch
save_steps: null
save_total_limit: 10

# Sequence
max_seq_length: 32768

# LoRA
use_peft: true
peft_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05

# Precision + optimization
bf16: true
seed: 42
logging_steps: 10
eval_strategy: no
dataloader_num_workers: 4
remove_unused_columns: false

# Dataset composition
# R1/R2: 392 items (weight 1) = 392 samples
# W1: 24 items (weight 2) = 48 samples
# W2: 77 items (weight 2) = 154 samples
# Total: 594 effective samples per epoch × 8 epochs = 4752 samples

# Teacher distribution
# Sonnet: 366 items (74.2%)
# GPT-5.4: 104 items (21.1%)
# GPT-OSS: 23 items (4.7%)

# Trace statistics
# Length: min=5, median=110, max=937 tokens (mean=151)
# Format: 100% have \boxed{} answers
# Skipped: 11 items (no matching teacher answer vs consensus)

# Batch updates per epoch
# Total samples: 594
# Batch size: 2 (per device)
# Gradient accumulation: 8
# Effective batch: 2 × 8 = 16
# Updates/epoch: ceil(594 / 16) ≈ 38
